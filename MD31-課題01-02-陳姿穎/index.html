<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/sanitize.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/config.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <title>台湾で、ポトレ、しない？</title>
  </head>
  <body class="bg-main text-txt">
    <main>
      <section id="top" class="flex max-w-box-md m-auto">
        <div class="pr-7">
          <img src="./images/mv01.jpg" alt="" />
        </div>
        <div class="pl-7">
          <h1 class="text-lg mb-15 mt-9">台湾で、ポトレ、しない？</h1>
          <img src="./images/mv02.jpg" alt="" />
        </div>
      </section>
      <section id="catchcopy" class="max-w-box-lg m-auto flex justify-around mb-36">
        <p class="w-1/2">
          当たり前な物ほど失って気付く、<br />居場所も分からない。<br />携帯画面見つめ今日も一つ涙。<br /><br />　　──
          あの頃に戻りたい。
        </p>
        <p></p>
      </section>
      <section id="day" class="max-w-box-lg m-auto">
        <div class="flex">
          <div class="w-1/2 flex flex-col justify-between">
            <h2 class="text-xxl">DAY</h2>
            <img src="./images/day05.jpg" alt="" />
          </div>
          <div class="w-1/2 px-28">
            <img src="./images/day06.jpg" alt="" />
          </div>
        </div>
        <div class="w-1/3 m-auto mt-28 mb-69">
          <img src="./images/day07.jpg" alt="" />
        </div>
        <div class="flex">
          <img src="./images/day01.jpg" alt="" class="w-18/25" />
        </div>
        <div class="flex justify-end -mt-56">
          <img src="./images/day02.jpg" alt="" class="w-1/3" />
        </div>
        <div class="w-1/5 m-auto mb-64">
          <img src="./images/day03.jpg" alt="" />
        </div>
      </section>
      <section id="night" class="max-w-box-lg m-auto">
        <h2 class="text-xxl text-wt absolute right-0">NIGHT</h2>

        <div class="flex justify-between">
          <div class="w-7/11">
            <img src="./images/night03.jpg" alt="" />
          </div>
          <div class="w-1/3 mt-12">
            <img src="./images/night02.jpg" alt="" />
          </div>
        </div>
        <p class="">こんなところだけど、誰かの心に残る存在であって欲しい。</p>
      </section>
      <section id="action"></section>
      <section id="others"></section>
    </main>
    <footer>
      <div class="profile"></div>
      <div class="copyright">
        <p class="text-sm my-20">©Portrait @ TAIWAN 2022 All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
